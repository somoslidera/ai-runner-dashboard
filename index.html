<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Runner · Ranking de Influencers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --lime:#C8F000; --lime-dim:#a9cc00; --ink:#0c0d0a; --panel:#16180f;
  --panel-2:#1d2014; --line:#2b2f1d; --txt:#f3f5ec; --muted:#8d927e;
  --gold:#E9D27A; --silver:#C9CDD6; --bronze:#D69A6A; --warn:#e0b341;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--ink); color:var(--txt);
  font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;
  background-image:radial-gradient(circle at 80% -10%, rgba(200,240,0,.06), transparent 45%);
}
.wrap{max-width:1080px;margin:0 auto;padding:0 22px 70px}

header{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;padding:22px 0 20px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:14px}
.brand img{height:42px;display:block}
.brand .sep{width:1px;height:34px;background:var(--line)}
.brand h1{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:21px;letter-spacing:.04em;text-transform:uppercase;line-height:1}
.brand h1 span{display:block;font-size:11px;font-weight:600;color:var(--lime);letter-spacing:.18em;margin-top:3px}
.actions{display:flex;flex-direction:column;align-items:flex-end;gap:7px}
.loadbtn{display:inline-flex;align-items:center;gap:9px;cursor:pointer;background:var(--lime);color:#000;border:none;border-radius:999px;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;letter-spacing:.04em;text-transform:uppercase;padding:11px 20px;
  transition:transform .12s ease, box-shadow .2s ease, opacity .2s}
.loadbtn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(200,240,0,.25)}
.loadbtn:disabled{opacity:.55;cursor:default;transform:none;box-shadow:none}
.loadbtn svg{width:16px;height:16px}
.loadbtn.spin svg{animation:rot 1s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.status{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:6px}
.status .d{width:7px;height:7px;border-radius:50%;background:var(--lime);box-shadow:0 0 0 3px rgba(200,240,0,.15)}
.status.err{color:var(--warn)} .status.err .d{background:var(--warn);box-shadow:0 0 0 3px rgba(224,179,65,.15)}
.status a{color:var(--lime);text-decoration:underline;cursor:pointer}

#drop{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;background:rgba(8,9,6,.86);backdrop-filter:blur(3px)}
#drop.show{display:flex}
#drop .box{border:2px dashed var(--lime);border-radius:20px;padding:60px 80px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:26px;text-transform:uppercase;letter-spacing:.05em}

.eyebrow{font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.16em;font-size:13px;color:var(--lime);margin:8px 0 14px;display:flex;align-items:center;gap:10px}
.eyebrow::before{content:"";width:22px;height:2px;background:var(--lime)}

.podium-card{background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:30px 26px 0;margin-bottom:30px;overflow:hidden}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:18px;min-height:300px}
.col{flex:1;max-width:230px;display:flex;flex-direction:column;align-items:center}
.avatar{width:66px;height:66px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:24px;color:#000;margin-bottom:10px}
.col .nm{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;text-align:center;line-height:1.1;text-transform:uppercase;letter-spacing:.02em;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%}
.col .pts{font-size:13px;color:var(--muted);margin-bottom:12px;font-weight:600}
.col .pts b{color:var(--lime);font-size:15px}
.block{width:100%;border-radius:12px 12px 0 0;position:relative;display:flex;align-items:center;justify-content:center;transition:height 1s cubic-bezier(.2,.7,.2,1);height:0;overflow:hidden}
.block .rank{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:54px;line-height:1;color:rgba(0,0,0,.65)}
.c1 .avatar{background:var(--gold)} .c1 .block{background:linear-gradient(180deg,var(--gold),#b89a3e)}
.c2 .avatar{background:var(--silver)} .c2 .block{background:linear-gradient(180deg,var(--silver),#878b94)}
.c3 .avatar{background:var(--bronze)} .c3 .block{background:linear-gradient(180deg,var(--bronze),#9e6b40)}
.c1 .nm{font-size:21px}

.list{background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden;min-height:80px}
.row{display:grid;grid-template-columns:46px 1fr 92px;align-items:center;gap:14px;padding:13px 20px;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.row:hover{background:var(--panel-2)}
.pos{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;color:var(--muted);text-align:center}
.row.top .pos{color:var(--lime)}
.who{display:flex;align-items:center;gap:12px;min-width:0}
.chip{width:34px;height:34px;border-radius:50%;background:var(--panel-2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;color:var(--lime);flex:none}
.who .info{min-width:0;flex:1}
.who .name{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar{height:5px;background:var(--panel-2);border-radius:999px;margin-top:6px;overflow:hidden}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--lime-dim),var(--lime));border-radius:999px;width:0;transition:width .9s cubic-bezier(.2,.7,.2,1)}
.score{text-align:right}
.score b{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:26px;line-height:1}
.score span{display:block;font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.msg{padding:48px 20px;text-align:center;color:var(--muted);font-size:14px}

footer{margin-top:34px;padding-top:18px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;font-size:12px;color:var(--muted)}
footer .legend span{margin-right:16px}
footer .legend b{color:var(--txt)}

@media(max-width:720px){
  .podium{gap:8px;min-height:250px}
  .col .nm{font-size:14px}.c1 .nm{font-size:16px}
  .avatar{width:50px;height:50px;font-size:19px}
  .row{grid-template-columns:34px 1fr 74px}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>

<script>
const SHEET_ID='1_hKSpyYLmKd-Apk8g7ObxWQnUv2IH87wAqoje1vcKtQ';
const GID='1516368295';
const fmt = n => n.toLocaleString('pt-BR');

function initials(name){
  const h = name.replace(/^@/,'').trim();
  const parts = h.split(/[\s._]+/).filter(Boolean);
  if(parts.length>=2) return (parts[0][0]+parts[1][0]).toUpperCase();
  return h.slice(0,2).toUpperCase();
}
const handle = n => '@'+n.replace(/^@/,'');

function render(data){
  data = data.filter(d=>d[0] && String(d[0]).trim()!=='').sort((a,b)=>b[1]-a[1]);
  const max = data.length ? data[0][1] : 0;

  const podium = document.getElementById('podium');
  podium.innerHTML='';
  const top = data.slice(0,3);
  const slots=[{i:1,cls:'c2',h:168},{i:0,cls:'c1',h:230},{i:2,cls:'c3',h:120}];
  slots.forEach(s=>{
    const d=top[s.i]; if(!d) return;
    const col=document.createElement('div'); col.className='col '+s.cls;
    col.innerHTML='<div class="avatar">'+initials(d[0])+'</div>'+
      '<div class="nm" title="'+handle(d[0])+'">'+handle(d[0])+'</div>'+
      '<div class="pts"><b>'+fmt(d[1])+'</b> pts</div>'+
      '<div class="block"><div class="rank">'+(s.i+1)+'</div></div>';
    podium.appendChild(col);
    const block=col.querySelector('.block');
    setTimeout(()=>{block.style.height=s.h+'px';},120);
  });

  const list=document.getElementById('list'); list.innerHTML='';
  if(!data.length){ list.innerHTML='<div class="msg">Nenhum influencer com dados ainda.</div>'; return; }
  data.forEach((d,idx)=>{
    const row=document.createElement('div'); row.className='row'+(idx<3?' top':'');
    const pct=max>0?(d[1]/max*100):0;
    row.innerHTML='<div class="pos">'+(idx+1)+'</div>'+
      '<div class="who"><div class="chip">'+initials(d[0])+'</div>'+
      '<div class="info"><div class="name">'+handle(d[0])+'</div>'+
      '<div class="bar"><i data-w="'+pct+'"></i></div></div></div>'+
      '<div class="score"><b>'+fmt(d[1])+'</b><span>pontos</span></div>';
    list.appendChild(row);
  });
  setTimeout(()=>{ list.querySelectorAll('.bar i').forEach(b=>b.style.width=b.dataset.w+'%'); },150);
}

function parseGviz(resp){
  const tbl=resp.table, rows=tbl.rows||[], ncols=(tbl.cols||[]).length;
  const cv=(r,i)=>{const c=r.c; return (c&&c[i]&&c[i].v!=null)?c[i].v:null;};
  let h=rows.findIndex(r=>{const v=cv(r,0); return typeof v==='string'&&v.trim().toLowerCase()==='influencer';});
  if(h<0) h=0;
  const out=[];
  for(let k=h+1;k<rows.length;k++){
    const nm=cv(rows[k],0);
    if(typeof nm!=='string'||!nm.trim()) continue;
    if(/total dia/i.test(nm)) break;
    let s=0;
    for(let c=1;c<ncols-1;c++){const v=cv(rows[k],c); if(typeof v==='number') s+=v;} // exclui ultima coluna (TOTAL)
    out.push([nm.trim(), s]);
  }
  return out;
}

// Reads the Google Sheet via gviz (<script> JSONP): no CORS issue, works locally or hosted.
function fetchSheet(){
  return new Promise((resolve,reject)=>{
    const cb='__gviz_'+Date.now();
    const sc=document.createElement('script');
    let done=false;
    const clean=()=>{ try{delete window[cb];}catch(e){window[cb]=undefined;} if(sc.parentNode) sc.remove(); };
    const to=setTimeout(()=>{ if(done)return; done=true; clean(); reject(new Error('timeout')); },12000);
    window[cb]=resp=>{ if(done)return; done=true; clearTimeout(to);
      try{ resolve(parseGviz(resp)); }catch(e){ reject(e); } finally{ clean(); } };
    sc.onerror=()=>{ if(done)return; done=true; clearTimeout(to); clean(); reject(new Error('load failed')); };
    sc.src='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?gid='+GID+'&headers=0&tqx=responseHandler:'+cb;
    document.head.appendChild(sc);
  });
}

const btn=document.getElementById('refresh');
const stEl=document.getElementById('status');
const stTxt=document.getElementById('statusTxt');
const nowTime=()=>new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
function setStatus(txt,err){ stEl.classList.toggle('err',!!err); stTxt.innerHTML=txt; }
function setBusy(b){ btn.disabled=b; btn.classList.toggle('spin',b); }

async function loadLive(){
  setBusy(true); setStatus('Atualizando…');
  try{
    render(await fetchSheet());
    setStatus('Atualizado '+nowTime());
  }catch(err){
    console.error(err);
    setStatus('Não foi possível carregar · <a id="rt">tentar novamente</a>', true);
    const r=document.getElementById('rt'); if(r) r.onclick=loadLive;
  }finally{ setBusy(false); }
}

btn.addEventListener('click', loadLive);
loadLive();
</script>
